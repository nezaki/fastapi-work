AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ALB + ECS(Fargate) で FastAPI を公開するための構成。
  VPC / Public サブネット2AZ / ECR / ECS クラスター・サービス / ALB を作成する。
  コスト抑制のため NAT Gateway は使わず、タスクは Public サブネットに配置する。

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: fastapi-ecs
    Description: 各リソース名の接頭辞 / ECR リポジトリ名として使用する
    AllowedPattern: "[a-z0-9-]+"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

  ImageTag:
    Type: String
    Default: latest
    Description: ECS タスクが参照する ECR イメージのタグ

  ContainerPort:
    Type: Number
    Default: 8000
    Description: 公開コンテナ(uvicorn)が待ち受けるポート

  InternalContainerPort:
    Type: Number
    Default: 8001
    Description: 内部サービス(internal_main.py)が待ち受けるポート。Service Connect の公開ポートにもなる

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: >
      ECS サービスの希望タスク数。初回デプロイ時はイメージ未 push のため 0 を指定し、
      push 後に 1 以上へ更新する運用を推奨。

  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]
    Description: Fargate タスクの CPU ユニット (256 = 0.25 vCPU)

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048", "3072", "4096", "8192"]
    Description: Fargate タスクのメモリ(MiB)。CPU との有効な組み合わせに注意

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC の CIDR ブロック

  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: Public サブネット1 の CIDR ブロック

  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: Public サブネット2 の CIDR ブロック

  LogRetentionInDays:
    Type: Number
    Default: 14
    Description: CloudWatch Logs の保持日数

  Enabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      課金リソース(ALB / TargetGroup / Listener / ECS サービス)を作成するか。
      false にすると ALB と Fargate タスクが削除され、固定費(主に ALB)が止まる。
      ネットワーク / ECR / IAM / クラスター / ログ / タスク定義は常に残す。
      停止/起動は scripts/stop.sh・scripts/start.sh で切り替える。

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  # Enabled=true のときだけ課金リソースを作成する(停止/起動の切り替えに使用)
  IsEnabled: !Equals [!Ref Enabled, "true"]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:
  # ---------------------- ネットワーク ----------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-2"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ---------------------- セキュリティグループ ----------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      # GroupDescription は ASCII のみ許可のため英語で記述(ALB 向け / 80 を全公開)
      GroupDescription: ALB security group - allow HTTP(80) from the internet
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-sg"

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      # GroupDescription は ASCII のみ許可のため英語で記述(ECS 向け / ALB からのみ許可)
      GroupDescription: ECS task security group - allow container port only from ALB
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ecs-sg"

  # ALB SG と ECS SG の循環参照を避けるため Ingress は別リソースで定義
  EcsSecurityGroupIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: From ALB to container port

  # 同一 ECS SG 内のタスク間で内部ポートへの通信を許可(Service Connect の内部通信)
  EcsSecurityGroupIngressInternal:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref InternalContainerPort
      ToPort: !Ref InternalContainerPort
      SourceSecurityGroupId: !Ref EcsSecurityGroup
      Description: Service Connect internal traffic within ECS SG

  # ---------------------- ECR ----------------------
  EcrRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Ref ProjectName
      ImageScanningConfiguration:
        ScanOnPush: true
      # タグ上書きを禁止し、デプロイを不変イメージ(commit SHA タグ)に固定する
      ImageTagMutability: IMMUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 3 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 3
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # 内部サービス(internal_main.py)用の別 ECR リポジトリ。設定は公開用と同一。
  InternalEcrRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Sub "${ProjectName}-internal"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 3 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 3
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ---------------------- SQS ----------------------
  # SQS はリクエスト課金のみでアイドル固定費が無いため、停止/起動(IsEnabled)の対象に
  # せず常設にする(ECR / Namespace / IAM と同様)。
  #
  # 受信失敗(可視性タイムアウト超過)が maxReceiveCount を超えたメッセージの退避先。
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-dlq"
      MessageRetentionPeriod: 1209600 # 14日(退避メッセージは長めに保持)
      SqsManagedSseEnabled: true

  # 公開サービスが送信するメインキュー(Standard)。
  AppQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-queue"
      VisibilityTimeout: 30
      ReceiveMessageWaitTimeSeconds: 20 # ロングポーリング(空受信を削減)
      MessageRetentionPeriod: 345600 # 4日(既定)
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  # ---------------------- Service Discovery (Cloud Map) ----------------------
  # ECS Service Connect が名前解決に使う名前空間。サービスを停止しても残すため
  # IsEnabled 条件は付けない(再開時に同じ名前空間を再利用する)。
  Namespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: !Sub "${ProjectName}.internal"
      Description: Service Connect namespace for internal service-to-service communication

  # ---------------------- CloudWatch Logs ----------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}"
      RetentionInDays: !Ref LogRetentionInDays

  # ---------------------- IAM ----------------------
  # タスク起動時に ECS エージェントが使用するロール(イメージ取得・ログ出力)
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # アプリケーション(コンテナ内プロセス)が AWS API を呼ぶ際に使うロール
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      # 公開サービスが SQS にメッセージ送信するための最小権限(送信のみ)。
      # 受信はコンシューマーを作らないため付与しない。DLQ はSQSが内部移送するため不要。
      Policies:
        - PolicyName: SqsSendPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt AppQueue.Arn

  # ---------------------- ECS ----------------------
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-cluster"
      ClusterSettings:
        # 練習用途ではコスト抑制のため無効。監視を強化したいときは enabled / enhanced へ
        - Name: containerInsights
          Value: disabled

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-task"
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        OperatingSystemFamily: LINUX
        CpuArchitecture: ARM64
      ContainerDefinitions:
        - Name: !Sub "${ProjectName}-container"
          Image: !Sub "${EcrRepository.RepositoryUri}:${ImageTag}"
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            # 内部サービスの呼び先(Service Connect の DNS エイリアス)
            - Name: INTERNAL_SERVICE_URL
              Value: !Sub "http://internal-api:${InternalContainerPort}"
            # 送信先 SQS キュー URL(!Ref はキュー URL を返す)
            - Name: SQS_QUEUE_URL
              Value: !Ref AppQueue
            # boto3 のリージョン解決用(Fargate は AWS_REGION を自動設定しないため明示)
            - Name: AWS_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # 内部サービス(internal_main.py)のタスク定義。
  # Service Connect で公開するため PortMappings に Name / AppProtocol を付与する。
  InternalTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-internal-task"
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        OperatingSystemFamily: LINUX
        CpuArchitecture: ARM64
      ContainerDefinitions:
        - Name: !Sub "${ProjectName}-internal-container"
          Image: !Sub "${InternalEcrRepository.RepositoryUri}:${ImageTag}"
          Essential: true
          PortMappings:
            # Service Connect は名前付きポート(Name)が必須。PortName として参照される。
            - Name: internal
              ContainerPort: !Ref InternalContainerPort
              Protocol: tcp
              AppProtocol: http
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: internal

  # ---------------------- ALB ----------------------
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: IsEnabled
    Properties:
      Name: !Sub "${ProjectName}-alb"
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: IsEnabled
    Properties:
      Name: !Sub "${ProjectName}-tg"
      VpcId: !Ref Vpc
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: IsEnabled
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  EcsService:
    Type: AWS::ECS::Service
    Condition: IsEnabled
    # リスナーが先に作られていないとターゲット登録に失敗するため依存を明示
    DependsOn: HttpListener
    Properties:
      ServiceName: !Sub "${ProjectName}-service"
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      PlatformVersion: LATEST
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        # デプロイが安定しない場合は自動で前リビジョンへロールバックする
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          # Public サブネット配置 + パブリック IP 付与で NAT Gateway 無しに ECR/インターネットへ到達
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      # Service Connect のクライアントとして参加(自身は公開せず内部サービスを呼ぶだけ)
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt Namespace.Arn
      LoadBalancers:
        - ContainerName: !Sub "${ProjectName}-container"
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

  # 内部サービス。ALB には繋がず、Service Connect で internal-api:<port> として公開する。
  InternalEcsService:
    Type: AWS::ECS::Service
    Condition: IsEnabled
    Properties:
      ServiceName: !Sub "${ProjectName}-internal-service"
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref InternalTaskDefinition
      LaunchType: FARGATE
      PlatformVersion: LATEST
      DesiredCount: !Ref DesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      # Service Connect のサーバーとして名前付きポートを internal-api:<port> で公開
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt Namespace.Arn
        Services:
          - PortName: internal
            DiscoveryName: internal
            ClientAliases:
              - Port: !Ref InternalContainerPort
                DnsName: internal-api

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  LoadBalancerUrl:
    Condition: IsEnabled
    Description: API のエンドポイント URL
    Value: !Sub "http://${LoadBalancer.DNSName}"

  EcrRepositoryUri:
    Description: docker push 先の ECR リポジトリ URI(公開サービス)
    Value: !GetAtt EcrRepository.RepositoryUri

  InternalEcrRepositoryUri:
    Description: docker push 先の ECR リポジトリ URI(内部サービス)
    Value: !GetAtt InternalEcrRepository.RepositoryUri

  EcsClusterName:
    Description: ECS クラスター名
    Value: !Ref EcsCluster

  EcsServiceName:
    Condition: IsEnabled
    Description: ECS サービス名(公開)
    Value: !GetAtt EcsService.Name

  InternalEcsServiceName:
    Condition: IsEnabled
    Description: ECS サービス名(内部)
    Value: !GetAtt InternalEcsService.Name

  AppQueueUrl:
    Description: 公開サービスが送信する SQS キューの URL(受信確認に使用)
    Value: !Ref AppQueue

  AppQueueArn:
    Description: メインキューの ARN
    Value: !GetAtt AppQueue.Arn

  DeadLetterQueueUrl:
    Description: デッドレターキュー(DLQ)の URL
    Value: !Ref DeadLetterQueue
