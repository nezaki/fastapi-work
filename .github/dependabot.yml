version: 2
updates:
  # Python 依存 (uv 管理: pyproject.toml / uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "依存更新"
    groups:
      python-deps:
        patterns:
          - "*"

  # GitHub Actions (.github/workflows/*.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CI更新"
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker ベースイメージ (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "イメージ更新"
